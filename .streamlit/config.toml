[theme]
# De hoofdkleur (Voor knoppen, vinkjes en lijnen als je ergens op klikt) - Ten Kate Rood
primaryColor = "#DF1F26"

# Achtergrondkleur van de pagina (Wit, voor de beste leesbaarheid)
backgroundColor = "#FFFFFF"

# Achtergrond van de invulvelden (Heel lichtgrijs, zodat ze goed opvallen)
secondaryBackgroundColor = "#F0F2F6"

# Tekstkleur
textColor = "#000000"

# Lettertype
font = "sans serif"
